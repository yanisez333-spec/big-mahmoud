<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Mahmoud — L'Art du Café</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* ROOT */
:root{
--gold:#D4AF37;
--gold-light:#F0D060;
--bg:#0a0805;
--text:#F5EDD8;
}

/* BODY */
body{
background:var(--bg);
color:var(--text);
font-family:'Montserrat',sans-serif;
overflow-x:hidden;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(14px);
z-index:1000;
}

/* HERO STORY */
.hero{
height:120vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero h1{
font-size:clamp(2.5rem,6vw,5rem);
font-family:'Playfair Display';
}

.hero span{
background:linear-gradient(90deg,var(--gold),var(--gold-light));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* STORY SECTIONS */
.story{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
opacity:0;
transform:translateY(80px);
transition:all 1.2s cubic-bezier(.22,1,.36,1);
}

.story.visible{
opacity:1;
transform:translateY(0);
}

/* GLASS CARD */
.glass{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
padding:40px;
border-radius:16px;
border:1px solid rgba(212,175,55,0.2);
box-shadow:0 30px 80px rgba(0,0,0,0.6);
max-width:700px;
}

/* MENU */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.card{
padding:20px;
border-radius:12px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(212,175,55,0.2);
transition:.4s;
}

.card:hover{
transform:scale(1.08) translateY(-8px);
box-shadow:0 30px 80px rgba(212,175,55,0.3);
}

/* CANVAS */
#canvas{
position:fixed;
inset:0;
z-index:-1;
}

/* COOKIE */
.cookie{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px 25px;
border-radius:10px;
opacity:0;
transition:.4s;
display:flex;
align-items:center;
gap:15px;
border:1px solid rgba(212,175,55,0.1);
}

.cookie.show{opacity:1}

.cookie button {
  padding: 6px 16px;
  background: var(--gold);
  color: #0a0805;
  border: none;
  border-radius: 6px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: .3s;
}

.cookie button:hover {
  background: var(--gold-light);
  transform: scale(1.05);
}

/* PERF */
body[data-device="low"] *{
animation:none!important;
transition:none!important;
}

/* MOBILE */
@media(max-width:768px){
.hero{height:100vh}
.story{height:auto;padding:80px 20px}
.nav{padding:15px 20px;}
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="nav">
<div>Big Mahmoud</div>
<div>Expérience Café</div>
</div>

<section class="hero">
<h1>L'Art du Café,<br><span>Redéfini</span></h1>
</section>

<section class="story">
<div class="glass">
<h2>Une origine</h2>
<p>Des grains sélectionnés dans les meilleurs terroirs.</p>
</div>
</section>

<section class="story">
<div class="glass">
<h2>Une maîtrise</h2>
<p>Torréfaction précise, extraction parfaite.</p>
</div>
</section>

<section class="story">
<div class="glass">
<h2>Une expérience</h2>
<p>Chaque tasse est un moment unique.</p>
</div>
</section>

<section class="story">
<div>
<h2>Notre Sélection</h2>
<div class="grid">
<div class="card">Espresso</div>
<div class="card">Latte</div>
<div class="card">Cold Brew</div>
</div>
</div>
</section>

<div id="cookie" class="cookie">
Nous utilisons des cookies
<button onclick="accept()">OK</button>
</div>

<script>

/* DEVICE */
function device(){
let c=navigator.hardwareConcurrency||2;
return c>=6?"high":c>=4?"medium":"low";
}
const DEVICE=device();
document.body.dataset.device=DEVICE;

/* CANVAS */
(function(){
if(DEVICE==="low")return;
const c=document.getElementById("canvas");
const ctx=c.getContext("2d");
let w,h,t=0;

function r(){w=c.width=innerWidth;h=c.height=innerHeight;}
r();addEventListener("resize",r);

function d(){
t+=0.01;
ctx.fillStyle="#0a0805";
ctx.fillRect(0,0,w,h);

let x=w/2+Math.sin(t)*70;
let y=h/2+Math.cos(t)*50;

let g=ctx.createRadialGradient(x,y,20,x,y,400);
g.addColorStop(0,"rgba(212,175,55,0.12)");
g.addColorStop(1,"transparent");

ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(x,y,400,0,Math.PI*2);
ctx.fill();

requestAnimationFrame(d);
}
d();
})();

/* SCROLL STORY */
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("visible");
}
});
},{threshold:0.2});

document.querySelectorAll(".story").forEach(el=>observer.observe(el));

/* PARALLAX SUBTILE SUR LE CONTENU */
const mainContent = document.querySelectorAll('.story, .hero');
addEventListener("mousemove", e => {
  if (DEVICE !== "high") return;
  let x = (e.clientX / innerWidth - 0.5) * 15;
  let y = (e.clientY / innerHeight - 0.5) * 15;
  
  mainContent.forEach(el => {
    el.style.transform = `translate(${x}px, ${y}px)`;
  });
});

/* COOKIE */
function accept(){
localStorage.setItem("c","1");
document.getElementById("cookie").remove();
}
if(!localStorage.getItem("c")){
setTimeout(()=>document.getElementById("cookie").classList.add("show"),1200);
}

</script>

</body>
</html>
