<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://*.googleusercontent.com;">

    <title>Big Mahmoud | L'Art du Café</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0A0A0A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Curseur personnalisé */
        #cursor-dot {
            width: 6px;
            height: 6px;
            background: var(--gold);
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
        }

        /* Section Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease-out;
        }

        h1 span {
            color: var(--gold);
            display: block;
        }

        p {
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 2rem;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        .visible {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--gold);
            font-size: 0.8rem;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="loading">CHARGEMENT...</div>

    <section class="hero" id="hero-section">
        <div class="hero-content">
            <p id="hero-subtitle"></p>
            <h1 id="hero-title">
                <span id="title-main"></span>
                <span id="title-gold" style="color: var(--gold);"></span>
            </h1>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURATION (Vérifie bien ton ID de projet ici)
        const firebaseConfig = {
            projectId: "bigmahmoud-b5659",
            authDomain: "bigmahmoud-b5659.firebaseapp.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Récupération des données en temps réel
        const unsub = onSnapshot(doc(db, "public_content", "home"), (doc) => {
            if (doc.exists()) {
                const data = doc.data();
                
                // Remplissage des textes
                document.getElementById('title-main').textContent = data.heroTitleMain;
                document.getElementById('title-gold').textContent = data.heroTitleGold;
                document.getElementById('hero-subtitle').textContent = data.heroSubtitle;
                
                // Image de fond
                if (data.heroImageUrl) {
                    document.getElementById('hero-section').style.backgroundImage = `url('${data.heroImageUrl.trim()}')`;
                }

                // Animations de visibilité
                document.getElementById('loading').style.display = 'none';
                document.getElementById('hero-title').classList.add('visible');
                document.querySelector('.hero-content p').classList.add('visible');
            } else {
                console.log("Document 'home' introuvable !");
            }
        });

        // Gestion du curseur
        const dot = document.getElementById('cursor-dot');
        window.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
